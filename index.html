<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LTL Intel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 text-slate-900">
<div x-data="app()" x-init="init()" class="min-h-screen">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
      <div class="min-w-0">
        <h1 class="text-lg sm:text-xl font-semibold">LTL Intel</h1>
        <p class="text-xs text-slate-500 hidden sm:block">Market benchmarks, class calculator, carrier scorecards &amp; Thule intel</p>
      </div>
      <div class="text-right text-xs text-slate-500 shrink-0">
        <div>Updated: <span x-text="lastUpdated"></span></div>
        <div class="hidden sm:block">v0.1 · <a class="underline" href="https://github.com/0xSector/ltl-intel" target="_blank">source</a></div>
      </div>
    </div>
    <div class="border-t border-slate-100 tabs-scroll">
      <nav class="max-w-7xl mx-auto px-2 sm:px-6 flex gap-0.5 sm:gap-1 w-max sm:w-auto">
        <template x-for="t in tabs" :key="t.id">
          <button
            @click="active = t.id"
            :class="active === t.id ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-600 hover:text-slate-900'"
            class="px-2 sm:px-4 py-3 text-xs sm:text-sm font-medium border-b-2 transition whitespace-nowrap shrink-0">
            <span class="sm:hidden" x-text="t.short"></span>
            <span class="hidden sm:inline" x-text="t.label"></span>
          </button>
        </template>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-5 sm:py-8">

    <section x-show="active === 'benchmark'" x-transition>
      <div id="tab-benchmark"></div>
    </section>

    <section x-show="active === 'classcalc'" x-transition>
      <div id="tab-classcalc"></div>
    </section>

    <section x-show="active === 'scorecard'" x-transition>
      <div id="tab-scorecard"></div>
    </section>

    <section x-show="active === 'thule'" x-transition>
      <div id="tab-thule"></div>
    </section>

    <section x-show="active === 'density'" x-transition>
      <div id="tab-density"></div>
    </section>

    <section x-show="active === 'lane'" x-transition>
      <div id="tab-lane"></div>
    </section>

    <section x-show="active === 'docs'" x-transition>
      <div id="tab-docs"></div>
    </section>

  </main>

  <footer class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8 text-xs text-slate-400">
    Public-data prototype. Not affiliated with Schneider National or Thule Group. No internal or proprietary data.
  </footer>
</div>

<script>
function app() {
  return {
    active: 'benchmark',
    lastUpdated: '—',
    tabs: [
      { id: 'benchmark', label: 'A · Market Benchmark',   short: 'A' },
      { id: 'classcalc', label: 'B · Class Calculator',   short: 'B' },
      { id: 'scorecard', label: 'C · Carrier Scorecard',  short: 'C' },
      { id: 'thule',     label: 'D · Thule Intel',        short: 'D' },
      { id: 'density',   label: 'E · Density Audit',      short: 'E' },
      { id: 'lane',      label: 'F · Lane Pricing',       short: 'F' },
      { id: 'docs',      label: 'Docs',                   short: 'Docs' },
    ],
    async init() {
      try {
        const r = await fetch('data/last_updated.json', { cache: 'no-store' });
        const j = await r.json();
        this.lastUpdated = j.date || '—';
      } catch { this.lastUpdated = 'seed data'; }

      // Lazy-load tabs; each module mounts into its own div
      window.TabBenchmark?.mount('#tab-benchmark');
      window.TabClassCalc?.mount('#tab-classcalc');
      window.TabScorecard?.mount('#tab-scorecard');
      window.TabThule?.mount('#tab-thule');
      window.TabDensity?.mount('#tab-density');
      window.TabLane?.mount('#tab-lane');
      window.TabDocs?.mount('#tab-docs');
    }
  };
}
</script>
<script src="js/lib-fsc.js"></script>
<script src="js/tab-benchmark.js"></script>
<script src="js/tab-classcalc.js"></script>
<script src="js/tab-scorecard.js"></script>
<script src="js/tab-thule.js"></script>
<script src="js/tab-density.js"></script>
<script src="js/tab-lane.js"></script>
<script src="js/tab-docs.js"></script>
</body>
</html>
