name: Refresh LTL data

on:
  schedule:
    - cron: "0 14 * * 1"  # Mondays 14:00 UTC (10 ET)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch diesel (EIA)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/fetch_diesel.py || echo "diesel fetch skipped"

      - name: Fetch SEC filings index
        run: python scripts/fetch_sec.py || echo "sec fetch skipped"

      - name: Stamp last_updated
        run: python scripts/fetch_last_updated.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): weekly refresh"
            git push
          fi
